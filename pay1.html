<html>
<head>    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
    <style>
        body {
            font-family: Arial;
            background-image: url("https://img.freepik.com/free-vector/credit-card-background-with-speed-lines-streak_1017-36079.jpg");
	    background-size : cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
	    font-size : 8px;
        }
	
	h1
	{
	text-align : center;
	}
        .container {
            background: #9505ff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 400px;
border:2px solid black;
        }
	
        label {
            font-weight: bold;
            color: white;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
            border: 1px solid black;
background-color:#ccc;
            border-radius: 5px;
        }
input::placeholder { color: black; }
        .payment {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .pay-button {
            background:white;
	    border: 2px solid black;
            color: #228c22;
	    text-align:center;
font-weight:900;
font-size:20px;
        }
        .cancel-button {
            background: white;
	    border: 2px solid black;
	    color:red;
	    text-align:center;
font-weight:900;
font-size:20px;
        }

	.pay-button:hover{
	background : #228c22;
	color: white;
	}

	.cancel-button:hover{
	background: red;
	color:white;
	}

    </style>
</head>
<body>
    <div class="container">
	<h1 style="font-size:500%;color:white;"><u>PAYMENT </u><h1>
        <label for="tp"> Total Price </label>
        <input type="numbers" placeholder="total amount " id ="tp" value="" >
        
        <label for="cc" > Coupon Code</label>
        <input type="text" placeholder="enter coupon code" id ="cc" value="">
        
        <label>Discount (INR)</label>
        <div style="display: flex; gap: 5px;">
            <input type="number" value="" placeholder="discount amount">
            <select>
                <option>%</option>
            </select>
        </div>
	
	
	<label for="tpd"> Total Price After Discount </label>
        <input type="numbers" placeholder="total amount to be paid " id ="tpd" value="" >
        
        <label>PAYMENT METHOD</label>
        <div class="payment">
        <select>
	<option>-</option>
	<option>Cash</option>
	<option>Card</option>
	</select>
        </div>
              
        
        <div>
           <button class="pay-button" onclick="window.location.href='paysuccess.html'">PAY</button>
            <button class="cancel-button" onclick="window.location.href='cancel.html'">CANCEL</button>

        </div>
    </div>
</body>
</html>
