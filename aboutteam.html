<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Our Team | Velvet Kitchen</title>
    <style>
       /* General styles */
body {
    font-family: 'Garamond', serif;
    background-color: #f8f8f8;
    margin: 0;
    padding: 0;
    text-align: center;
}

.team-container {
    margin-top: 50px;
    padding: 20px;
}

h1 {
    font-size: 3rem;
    color: #6A0DAD;
    margin-bottom: 50px;
    font-weight: bold;
    text-transform: uppercase;
}

.team-cards {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 20px;
    margin: 0 auto;
    max-width: 100%; 
    flex-wrap: wrap; /* Allow wrapping on smaller screens */
    perspective: 1000px; /* Enables 3D effect */
}

.team-card {
    width: 200px;
    height: 250px;
    perspective: 1000px;
    display: flex; /* Ensures proper layout */
    align-items: center;
    justify-content: center;
}

.team-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.6s ease-in-out;
}

.team-card:hover .team-card-inner {
    transform: rotateY(180deg);
}

.team-card-front, 
.team-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden; 
    border-radius: 12px;
}

.team-card-front {
    background: linear-gradient(145deg, #FFFFFF, #f3e8ff);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 15px;
}

.team-card-front img {
    border-radius: 50%;
    width: 110px;
    height: 110px;
    object-fit: cover;
    border: 3px solid #D4AF37;
}

.team-card-front h3 {
    font-size: 1.4rem;
    color: #6A0DAD;
    margin: 10px 0 5px;
    font-weight: bold;
}

.team-card-back {
    background: #6A0DAD;
    color: white;
    transform: rotateY(180deg); 
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 2px solid #D4AF37;
}

/* Mobile responsiveness */
@media (max-width: 768px) {
    .team-cards {
        gap: 20px;
    }

    .team-card {
        width: 180px;
        height: 230px;
    }

    h1 {
        font-size: 2.5rem;
    }
}


    </style>
</head>
<body>
    <div class="team-container">
        <h1>Meet Our Team</h1>
        <div class="team-cards">
            <div class="team-card">
                <div class="team-card-inner">
                    <div class="team-card-front">
                        <img src="Tej.png" alt="Team Member">
                        <h3>Tejas</h3>
                    </div>
                    <div class="team-card-back">
                        <p>📞 +91 9115416999</p>
                    </div>
                </div>
            </div>

            <div class="team-card">
                <div class="team-card-inner">
                    <div class="team-card-front">
                        <img src="bhargav.png" alt="Team Member">
                        <h3>Bhargav</h3>
                    </div>
                    <div class="team-card-back">
                        <p>📞 +91 7981512532</p>
                    </div>
                </div>
            </div>

            <div class="team-card">
                <div class="team-card-inner">
                    <div class="team-card-front">
                        <img src="ppr.png" alt="Team Member">
                        <h3>Pravallika</h3>
                    </div>
                    <div class="team-card-back">
                        <p>📞 +91 9840138432</p>
                    </div>
                </div>
            </div>

            <div class="team-card">
                <div class="team-card-inner">
                    <div class="team-card-front">
                        <img src="surya.png" alt="Team Member">
                        <h3>Surya</h3>
                    </div>
                    <div class="team-card-back">
                        <p>📞 +91 7093783389</p>
                    </div>
                </div>
            </div>

            <div class="team-card">
                <div class="team-card-inner">

                        <h3>Santhan</h3>
                    </div>
                    <div class="team-card-back">

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
